name: Build 

on:
  push:
    branches: 
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    branches: [ '**' ]

jobs:

  check-style:
    name: Code style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Format check
        run: nix develop --command cargo fmt -- --check
      - name: Clippy
        run: nix develop --command cargo clippy -- -W clippy::pedantic -W clippy::nursery -D warnings

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:      
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Run tests
        run: nix develop --command cargo test

  build:
    name: Build Radioboat
    runs-on: ubuntu-latest
    needs: [unit-tests, check-style]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Build package
        run: nix build
