name: Build 

on:
  push:
    branches: 
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    branches: [ '**' ]

jobs:

  check-style:
    name: Code style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Format check
        run: nix develop --command cargo fmt -- --check
      - name: Clippy
        run: nix develop --command cargo clippy -- -W clippy::pedantic -W clippy::nursery -D warnings

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:      
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Run tests
        run: nix develop --command cargo test

  build-cargo:
    name: Build (Cargo)
    runs-on: ubuntu-latest
    needs: [unit-tests, check-style]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Build with Cargo
        run: nix develop --command cargo build --release

  build-nix:
    name: Build (Nix package)
    runs-on: ubuntu-latest
    needs: [build-cargo]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - name: Build Nix package
        run: nix build
      - name: Verify completions
        run: |
          ls -la result/share/bash-completion/completions/
          ls -la result/share/fish/vendor_completions.d/
          ls -la result/share/zsh/site-functions/
